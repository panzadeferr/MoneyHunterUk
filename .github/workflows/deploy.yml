name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permissions at workflow level — required for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── JOB 1: RUN ALL TESTS ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── TEST 1: JS Syntax Check ──
      - name: JS Syntax Check (app.html)
        run: node syntax-check.mjs

      # ── TEST 2: Check required files exist ──
      - name: Check required files exist
        run: |
          echo "Checking required files..."
          for file in index.html app.html sw.js manifest.json; do
            if [ ! -f "$file" ]; then
              echo "❌ MISSING: $file"
              exit 1
            else
              echo "✅ Found: $file"
            fi
          done
          echo "✅ All required files present."

      # ── TEST 3: Check no exposed secrets ──
      - name: Check no exposed secrets
        run: |
          echo "Scanning for exposed secrets..."
          if grep -r "xkeysib-" index.html app.html 2>/dev/null; then
            echo "❌ EXPOSED BREVO KEY found!"
            exit 1
          fi
          echo "✅ No exposed secrets found."

      # ── TEST 4: Validate manifest.json ──
      - name: Validate manifest.json
        run: |
          node -e "
            const m = JSON.parse(require('fs').readFileSync('manifest.json','utf8'));
            ['name','short_name','start_url','display','icons'].forEach(k => {
              if (!m[k]) { console.log('❌ Missing:', k); process.exit(1); }
              console.log('✅', k);
            });
            console.log('✅ manifest.json valid');
          "

      - name: All tests passed
        run: echo "✅ All checks passed — deploying..."

  # ── JOB 2: DEPLOY TO GITHUB PAGES ────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployed
        run: echo "✅ Live at ${{ steps.deployment.outputs.page_url }}"
