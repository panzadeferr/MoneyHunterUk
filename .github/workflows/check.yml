name: Test Bot

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Bot Tests
    runs-on: ubuntu-latest
    # Only run if bot.py exists — prevents failing in MoneyHunterUk repo
    if: hashFiles('bot.py') != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Python syntax check
        run: |
          python -m py_compile bot.py && echo "✅ bot.py syntax OK"

      - name: Check no hardcoded secrets
        run: |
          if grep -E "[0-9]{8,10}:AA[a-zA-Z0-9_-]{33}" bot.py; then
            echo "❌ HARDCODED TELEGRAM TOKEN found!"
            exit 1
          fi
          echo "✅ No hardcoded secrets."

      - name: Check env var usage
        run: |
          grep -q 'os.environ.get("BOT_TOKEN")' bot.py && echo "✅ BOT_TOKEN from env" || (echo "❌ BOT_TOKEN not from env!" && exit 1)
          grep -q 'os.environ.get("BREVO_API_KEY")' bot.py && echo "✅ BREVO_API_KEY from env" || (echo "❌ BREVO_API_KEY not from env!" && exit 1)

      - name: Check Flask endpoints
        run: |
          grep -q '"/health"' bot.py && echo "✅ /health found" || (echo "❌ /health missing!" && exit 1)
          grep -q '"/subscribe"' bot.py && echo "✅ /subscribe found" || (echo "❌ /subscribe missing!" && exit 1)

      - name: All bot tests passed
        run: echo "✅ All bot checks passed. Railway will autodeploy."
